name: maffy
description: "A Desmos-like graphing calculator built with Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Local graphing libraries
  mafs_flutter:
    path: ../mafs-flutter
  flutter_plot:
    path: ../flutter-plot

  # Math keyboard and input
  math_keyboard: ^0.3.3

  # Math expression parsing and evaluation
  math_expressions: ^2.7.0

  # LaTeX rendering
  flutter_math_fork: ^0.7.4

  # State management
  provider: ^6.1.2

  # Utilities
  uuid: ^4.5.1
  collection: ^1.19.1
  equatable: ^2.0.7

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
